<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- DB monogram favicon. Dark rounded square + teal "DB" in a mono weight.
       Files in public/ are served as-is from the site root (e.g. /favicon.svg). -->
  <rect width="64" height="64" rx="14" fill="#0A0C12"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#232C39" stroke-width="2"/>
  <text x="32" y="34" dominant-baseline="central" text-anchor="middle"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="26" font-weight="700" fill="#2DD4BF" letter-spacing="-1">DB</text>
</svg>
